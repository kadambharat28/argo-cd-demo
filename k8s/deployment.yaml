apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-html
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-html
  template:
    metadata:
      labels:
        app: simple-html
    spec:
      containers:
        - name: nginx
          image: nginx:stable
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: html-volume
          configMap:
            name: simple-html-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: simple-html-config
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Argo CD Demo</title>
    </head>
    <body>
      <h1>Hello from Argo CD</h1>
      <p>This app is deployed on local Kubernetes using Argo CD.</p>
    </body>
    </html>